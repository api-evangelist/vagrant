aid: vagrant
url: https://raw.githubusercontent.com/api-evangelist/vagrant/refs/heads/main/apis.yml
apis:
  - aid: vagrant:vagrant-cloud-api
    name: Vagrant Cloud API
    tags:
      - DevOps
      - Virtualization
      - Development Environments
      - Boxes
      - Cloud
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://app.vagrantup.com/api/v2
    humanURL: https://developer.hashicorp.com/vagrant/vagrant-cloud/api/v2
    properties:
      - url: https://developer.hashicorp.com/vagrant/vagrant-cloud/api/v2
        type: Documentation
      - type: OpenAPI
        url: openapi/vagrant-cloud-api-openapi.yml
    description: >-
      The Vagrant Cloud API v2 enables developers to programmatically interact
      with the Vagrant Cloud platform for managing Vagrant boxes, versions, and
      providers. It supports creating and updating boxes, publishing new versions,
      uploading provider binaries, and searching the public box catalog. The API
      uses token-based authentication and is designed for automating box lifecycle
      management and integrating Vagrant Cloud into CI/CD pipelines.
  - aid: vagrant:hcp-vagrant-box-registry-api
    name: HCP Vagrant Box Registry API
    tags:
      - DevOps
      - Virtualization
      - Registry
      - Boxes
      - Cloud
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.cloud.hashicorp.com
    humanURL: https://developer.hashicorp.com/hcp/api-docs/vagrant-box-registry
    properties:
      - url: https://developer.hashicorp.com/hcp/api-docs/vagrant-box-registry
        type: Documentation
      - type: OpenAPI
        url: openapi/vagrant-hcp-vagrant-box-registry-openapi.yml
    description: >-
      The HCP Vagrant Box Registry API provides REST endpoints for managing
      Vagrant box registries and boxes on the HashiCorp Cloud Platform. It
      supports creating and managing registries, listing and deleting boxes,
      and handling box versions and providers. The API uses HCP service principal
      credentials for authentication and is the successor to the legacy Vagrant
      Cloud service, offering tighter integration with the broader HashiCorp
      Cloud Platform ecosystem.
  - aid: vagrant:vagrant-cloud-ruby-client
    name: Vagrant Cloud Ruby Client
    tags:
      - DevOps
      - Virtualization
      - SDK
      - Ruby
      - Boxes
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://github.com/hashicorp/vagrant_cloud
    properties:
      - url: https://github.com/hashicorp/vagrant_cloud
        type: Documentation
    description: >-
      The Vagrant Cloud Ruby Client is an official Ruby library that wraps the
      Vagrant Cloud API, providing a convenient interface for managing boxes,
      versions, and providers programmatically. It allows developers to create,
      modify, and delete Vagrant Cloud resources from Ruby applications and
      scripts. The library is distributed as a RubyGem and is commonly used
      in automation workflows for publishing and maintaining Vagrant boxes.
  - aid: vagrant:vagrant-plugin-sdk
    name: Vagrant Plugin SDK
    tags:
      - DevOps
      - Virtualization
      - SDK
      - Plugins
      - Extensibility
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://developer.hashicorp.com/vagrant/docs/plugins/development-basics
    properties:
      - url: https://developer.hashicorp.com/vagrant/docs/plugins/development-basics
        type: Documentation
    description: >-
      The Vagrant Plugin SDK enables developers to build plugins that extend
      Vagrant with custom commands, providers, provisioners, guests, and host
      capabilities. Plugins are separate binaries that communicate with the
      Vagrant application using gRPC, and developers can use either Go or Ruby
      to build them. The SDK provides the foundation for adding support for new
      virtualization platforms, configuration management tools, and custom
      workflow commands to Vagrant.
common:
  - type: JSON-LD
    url: json-ld/vagrant-context.jsonld
  - type: JSONSchema
    url: json-schema/vagrant-box-schema.json
